<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 呆呆抽獎 🎟️</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* 高級感深色流光背景 */
        body { 
            background: radial-gradient(circle at 20% 20%, #1a0b2e, #0b0f19 60%, #05161e); 
            color: white; 
            min-height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* 奢華毛玻璃霓虹容器 */
        .container { 
            background: rgba(18, 11, 32, 0.65); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 35px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255, 0, 127, 0.15), inset 0 0 15px rgba(255,255,255,0.05); 
            width: 100%; 
            max-width: 520px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        h1 { 
            margin-top: 0; 
            background: linear-gradient(135deg, #ff007f, #ff7700, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255,0,127,0.6));
            font-size: 32px; 
            font-weight: 800;
            letter-spacing: 2px;
        }
        
        /* 獎品即時看板高級化 */
        .status-board { 
            background: rgba(5, 5, 10, 0.7); 
            padding: 18px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255, 0, 127, 0.3);
            box-shadow: inset 0 0 10px rgba(255, 0, 127, 0.1);
            text-align: left; 
            font-size: 14px; 
            line-height: 1.6; 
        }
        .prize-title-text { font-weight: bold; margin-bottom: 10px; color: #ff007f; display: block; font-size: 15px; text-shadow: 0 0 5px rgba(255,0,127,0.3); }
        .prize-item-row { display: flex; align-items: center; margin: 10px 0; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .prize-item-row:hover { background: rgba(255,255,255,0.06); border-color: rgba(0, 242, 254, 0.3); }
        .prize-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 10px; margin-right: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); display: block; }
        .prize-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .prize-name-label { font-size: 16px; font-weight: bold; color: #ffffff; margin-bottom: 2px; }

        .login-box { margin-bottom: 20px; }
        
        /* 高級下拉選單樣式 */
        select { 
            width: 85%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            font-size: 16px; 
            text-align: center; 
            text-align-last: center; /* 讓下拉選單文字居中 */
            background: rgba(255,255,255,0.08); 
            color: #fff; 
            font-weight: bold; 
            transition: 0.3s;
            cursor: pointer;
            appearance: none; /* 移除瀏覽器預設箭頭 */
            -webkit-appearance: none;
        }
        select:focus {
            outline: none;
            background: rgba(30, 20, 50, 0.9);
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0,242,254,0.4);
        }
        select option {
            background: #161124;
            color: #fff;
        }
        
        /* 高級拉霸滾動區 (黑金奢華風格) */
        .slot-machine { 
            background: #0d0614; 
            border: 4px solid #ff007f; 
            border-radius: 20px; 
            padding: 15px; 
            margin: 25px 0; 
            box-shadow: 0 0 35px rgba(255,0,127,0.5), inset 0 0 20px rgba(0,0,0,0.9); 
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
            height: 114px; 
        }
        .slot-window { 
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%); 
            color: #ffd700; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
            width: 95%; 
            height: 100%; 
            border-radius: 10px; 
            font-size: 24px; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            overflow: hidden; 
            border: 1px solid rgba(255, 215, 0, 0.3); 
        }
        .slot-track { display: flex; flex-direction: column; position: absolute; top: 0; }
        .slot-item { height: 76px; display: flex; align-items: center; justify-content: center; width: 100%; text-align: center; white-space: nowrap; padding: 0 10px; }

        /* 炫彩流光強烈發光按鍵 */
        button { 
            background: linear-gradient(135deg, #ff007f, #7928ca, #00f2fe); 
            background-size: 200% auto;
            color: white; 
            border: none; 
            padding: 16px 35px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 5px 25px rgba(255,0,127,0.4), 0 0 15px rgba(0,242,254,0.2); 
            transition: 0.3s; 
            width: 85%; 
            letter-spacing: 1px;
            animation: pulseGlow 2s infinite;
        }
        button:hover { 
            transform: scale(1.03); 
            background-position: right center;
            box-shadow: 0 8px 30px rgba(255,0,127,0.6), 0 0 25px rgba(0,242,254,0.4); 
        }
        button:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; transform: none; animation: none; border: 1px solid #333; }

        @keyframes pulseGlow {
            0% { box-shadow: 0 5px 20px rgba(255,0,127,0.4), 0 0 10px rgba(0,242,254,0.2); }
            50% { box-shadow: 0 5px 30px rgba(255,0,127,0.7), 0 0 25px rgba(0,242,254,0.5); }
            100% { box-shadow: 0 5px 20px rgba(255,0,127,0.4), 0 0 10px rgba(0,242,254,0.2); }
        }

        /* 中獎彈窗高級感 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,3,10,0.9); backdrop-filter: blur(8px); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #161124; color: #fff; padding: 35px; border-radius: 24px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(0,242,254,0.2); border: 1px solid rgba(255,255,255,0.1); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal h2 { color: #ff007f; margin-top: 0; font-size: 26px; text-shadow: 0 0 10px rgba(255,0,127,0.5); }
        .ticket-box { background: rgba(0,0,0,0.4); border: 2px dashed #00f2fe; padding: 18px; font-size: 22px; font-weight: bold; letter-spacing: 1px; color: #00f2fe; margin: 20px 0; border-radius: 12px; cursor: pointer; word-break: break-all; transition: 0.2s; box-shadow: 0 0 15px rgba(0,242,254,0.1); }
        .ticket-box:hover { background: rgba(0,242,254,0.05); box-shadow: 0 0 20px rgba(0,242,254,0.3); }
        .close-btn { background: #2a1f42; font-size: 14px; padding: 12px 25px; width: auto; margin-top: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .close-btn:hover { background: #3d2d5e; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 頂部名稱 -->
    <h1>🎰 呆呆抽獎 🎟️</h1>
    
    <!-- 2. 獎品清單看板 -->
    <div class="status-board" id="statusBoard">正在載入雲端禮品庫存...</div>

    <!-- 朋友名字下拉選單區 -->
    <div class="login-box" id="loginBox">
        <select id="playerName">
            <option value="" disabled selected>▼ 請選擇你的名字 ▼</option>
            <!-- ⚙️ 你可以在下面自由修改、新增或刪除朋友的名字 -->
            <option value="貝果">貝果</option>
            <option value="怡蒨">怡蒨</option>
            <option value="77">77</option>
            <option value="安鴻">安鴻</option>
            <option value="當家">當家</option>
        </select>
    </div>

    <!-- 拉霸機 -->
    <div class="slot-machine">
        <div class="slot-window">
            <div class="slot-track" id="slotTrack">
                <div class="slot-item" style="height:76px;">💎 祝你中獎 💎</div>
            </div>
        </div>
    </div>

    <button id="spinBtn" onclick="startDraw()">點我啟動拉霸機</button>
</div>

<!-- 獎券發放彈窗 -->
<div class="modal" id="winModal">
    <div class="modal-content">
        <h2 id="modalTitle">🎉 恭喜中獎！</h2>
        <p style="font-weight: bold; font-size: 18px; color: #ffd700;" id="modalPrizeName">獲得獎項</p>
        <div class="ticket-box" id="modalTicketCode" onclick="copyTicket()">TICKET-CODE</div>
        <p style="font-size: 12px; color: #aaa;" id="copyHint">↑ 點擊後輸入密碼「3064」，請截圖保存！</p>
        <button class="close-btn" onclick="closeModal()">關閉視窗</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // 🔗 您的專屬 Firebase 網址
    const firebaseConfig = {
        databaseURL: "https://daidaikunbao-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.startDraw = startDraw;
    window.closeModal = closeModal;
    window.copyTicket = copyTicket;

    let isDrawing = false;
    let localPrizesData = {};

    // 即時更新看板：僅顯示商品圖、品名、剩餘數量。
    onValue(ref(db, 'prizes'), (snapshot) => {
        const prizes = snapshot.val();
        if (!prizes) {
            document.getElementById("statusBoard").innerHTML = "❌ 系統提示：後台尚未配置任何獎品結構。";
            return;
        }
        localPrizesData = prizes;

        let html = '<span class="prize-title-text">📋 目前的禮物：</span>';
        let hasVisiblePrize = false;

        for (let id in prizes) {
            const p = prizes[id];
            
            if (p.name && p.name.includes("銘謝惠顧")) {
                continue; 
            }

            hasVisiblePrize = true;
            
            const imgHtml = p.image ? `<img class="prize-thumb" src="${p.image}" alt="${p.name}">` : `<div class="prize-thumb" style="background:rgba(255,255,255,0.15);"></div>`;

            if (Number(p.quantity) > 0) {
                html += `
                <div class="prize-item-row">
                    ${imgHtml}
                    <div class="prize-info">
                        <span class="prize-name-label">${p.name}</span>
                        <span style="color:#00f2fe; font-size:13px;">🟢 剩餘 <b>${p.quantity}</b> 份</span>
                    </div>
                </div>`;
            } else {
                html += `
                <div class="prize-item-row" style="opacity: 0.3;">
                    ${imgHtml}
                    <div class="prize-info">
                        <span class="prize-name-label" style="text-decoration: line-through; color:#888;">${p.name}</span>
                        <span style="color:#ff007f; font-size:13px;">🔴 已全數送完</span>
                    </div>
                </div>`;
            }
        }

        if (!hasVisiblePrize) {
            html += '<div style="color: #aaa; font-size: 13px; padding: 10px;">目前無公開好禮。</div>';
        }

        document.getElementById("statusBoard").innerHTML = html;
    });

    // 核心強奪鎖 ＆ 限制一人抽一次機制
    function startDraw() {
        const nameInput = document.getElementById("playerName").value;
        if (!nameInput) {
            alert("請先選擇你的名字喔！");
            return;
        }
        if (isDrawing) return;
        
        isDrawing = true;
        document.getElementById("spinBtn").disabled = true;
        document.getElementById("spinBtn").innerText = "好運計算中...";
        document.getElementById("playerName").disabled = true;

        const rootRef = ref(db);
        let finalWonPrize = null;
        let isAlreadyPlayed = false;

        runTransaction(rootRef, (currentData) => {
            if (!currentData) return currentData;
            if (!currentData.prizes) currentData.prizes = {};
            if (!currentData.playedUsers) currentData.playedUsers = {};

            // 🚫 1. 檢查這個名字是否已經在雲端抽過獎了
            if (currentData.playedUsers[nameInput]) {
                isAlreadyPlayed = true;
                return; 
            }

            let currentPrizes = currentData.prizes;
            let pool = [];
            let totalW = 0;
            for (let id in currentPrizes) {
                if (Number(currentPrizes[id].quantity) > 0) {
                    pool.push({ id: id, weight: Number(currentPrizes[id].weight || 0) });
                    totalW += Number(currentPrizes[id].weight || 0);
                }
            }

            if (pool.length === 0 || totalW === 0) return;

            let randomNum = Math.floor(Math.random() * totalW);
            let selectedId = null;
            
            for (let i = 0; i < pool.length; i++) {
                randomNum -= pool[i].weight;
                if (randomNum < 0) {
                    selectedId = pool[i].id;
                    break;
                }
            }

            if (!selectedId) selectedId = pool[0].id;

            const prize = currentPrizes[selectedId];
            prize.quantity = Number(prize.quantity) - 1;

            let assignedCode = "無可用票券";
            if (prize.ticketCodes && prize.ticketCodes.length > 0) {
                const codeIndex = prize.ticketCodes.length - 1 - prize.quantity;
                if (prize.ticketCodes[codeIndex] !== undefined) {
                    assignedCode = prize.ticketCodes[codeIndex];
                } else {
                    assignedCode = prize.ticketCodes[0];
                }
            }

            if(!prize.recentWinners) prize.recentWinners = [];
            prize.recentWinners.push({ user: nameInput, code: assignedCode, time: Date.now() });

            // 📝 2. 將名字寫入雲端黑名單
            currentData.playedUsers[nameInput] = {
                time: Date.now(),
                won: prize.name
            };

            finalWonPrize = {
                name: prize.name,
                code: assignedCode
            };

            return currentData;
        }).then((result) => {
            if (isAlreadyPlayed) {
                alert(`⚠️ 提示：【${nameInput}】你已經抽過囉！不能太貪心哦～`);
                resetButtonState();
                return;
            }

            if (result.committed && finalWonPrize) {
                runSlotMachineAnimation(finalWonPrize.name, () => {
                    if (finalWonPrize.name.includes("銘謝惠顧")) {
                        showWinModal("😭 哎呀可惜！", finalWonPrize.name, "請再接再厲！", true);
                    } else {
                        showWinModal("🎉 恭喜你中獎了！", finalWonPrize.name, finalWonPrize.code, false);
                    }
                    resetButtonState();
                });
            } else {
                runSlotMachineAnimation("💔 沒中獎", () => {
                    showWinModal("沒中獎", "不要氣餒！", "下次再加油", true);
                    resetButtonState();
                });
            }
        }).catch((err) => {
            alert("系統錯誤：" + err.message);
            resetButtonState();
        });
    }

    // 拉霸滾動效果
    function runSlotMachineAnimation(finalResult, callback) {
        const track = document.getElementById("slotTrack");
        track.innerHTML = "";

        const dummyPool = ["睏寶", "怡蒨", "77", "安鴻", "當家"];
        for(let i=0; i<25; i++) {
            const item = document.createElement("div");
            item.className = "slot-item";
            item.style.height = "76px";
            item.innerText = dummyPool[Math.floor(Math.random() * dummyPool.length)];
            track.appendChild(item);
        }
        track.lastElementChild.innerText = finalResult;

        let currentTop = 0;
        let speed = 35;
        let count = 0;

        function animate() {
            currentTop -= speed;
            track.style.top = currentTop + "px";
            count++;

            if(count > 30) speed = 15;
            if(count > 50) speed = 6;
            if(count > 60) speed = 3;

            if (count > 68) {
                track.style.top = `-${(track.children.length - 1) * 76 - 2}px`;
                setTimeout(callback, 400);
            } else {
                requestAnimationFrame(animate);
            }
        }
        animate();
    }

    // 重設按鈕狀態
    function resetButtonState() {
        isDrawing = false;
        document.getElementById("spinBtn").disabled = false;
        document.getElementById("spinBtn").innerText = "點我啟動拉霸機";
        document.getElementById("playerName").disabled = false;
    }

    function showWinModal(title, prizeName, code, isLose) {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalPrizeName").innerText = prizeName;
        
        const ticketBox = document.getElementById("modalTicketCode");
        const hintBox = document.getElementById("copyHint");
        
        if (code.startsWith("http")) {
            ticketBox.innerText = "👉 點我並輸入密碼「3064」，即可查看獎品 👈";
            ticketBox.style.color = "#ff007f";
            ticketBox.style.border = "2px solid #ff007f";
            ticketBox.setAttribute("data-url", code);
            hintBox.innerText = "長按即可儲存截圖！";
            hintBox.style.display = "block";
        } else {
            ticketBox.innerText = code;
            ticketBox.removeAttribute("data-url");
            if(isLose) {
                ticketBox.style.border = "2px dashed #555";
                ticketBox.style.color = "#888";
                hintBox.style.display = "none";
            } else {
                ticketBox.style.border = "2px dashed #00f2fe";
                ticketBox.style.color = "#00f2fe";
                hintBox.innerText = "↑ 點擊後輸入密碼「3064」，請截圖保存！";
                hintBox.style.display = "block";
            }
        }
        document.getElementById("winModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("winModal").style.display = "none";
    }

    // 點擊卡片動作
    function copyTicket() {
        const ticketBox = document.getElementById("modalTicketCode");
        const imgUrl = ticketBox.getAttribute("data-url");
        
        if (imgUrl) {
            window.open(imgUrl, '_blank');
            return;
        }
        
        const code = ticketBox.innerText;
        if(code.includes("請再接再厲") || code.includes("重新再試")) return;
        navigator.clipboard.writeText(code).then(() => {
            alert("序號複製成功！可以去兌換囉！");
        });
    }
</script>
</body>
</html>
