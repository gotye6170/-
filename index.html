<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呆呆扭蛋機 🌟</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=900&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #fbcfe8, #e0e7ff, #ccfbf1); font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        .gacha-title { font-weight: 900; color: #ff3366; -webkit-text-stroke: 8px #ffffff; paint-order: stroke fill; }
        .gacha-machine { position: relative; width: 320px; background: linear-gradient(to bottom, #ef4444, #dc2626); border-radius: 40px 40px 20px 20px; box-shadow: 0 20px 0 #b91c1c, 0 30px 40px rgba(0,0,0,0.3); padding: 25px; margin: 0 auto; border: 6px solid #fee2e2; }
        .gacha-glass { position: relative; height: 240px; background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.4) 0%, rgba(243,244,246,0.8) 70%); border-radius: 30px; border: 6px solid #b91c1c; overflow: hidden; box-shadow: inset 0 10px 20px rgba(0,0,0,0.15); margin-bottom: 25px; }
        .gacha-egg { position: absolute; width: 38px; height: 38px; border-radius: 50%; box-shadow: inset -4px -4px 8px rgba(0,0,0,0.2); transition: transform 0.3s ease, opacity 0.5s ease; }
        .egg-pink { background: #ec4899; } .egg-blue { background: #3b82f6; } .egg-yellow { background: #eab308; } .egg-green { background: #22c55e; } .egg-purple { background: #a855f7; } .egg-orange { background: #f97316; }
        .egg-falling-out { animation: eggFallOut 0.8s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards !important; }
        @keyframes eggFallOut { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(120px); opacity: 0; } }
        .eggs-drop-down .gacha-egg:not(.egg-falling-out) { animation: gravitySettle 0.6s ease-out 0.3s forwards; }
        @keyframes gravitySettle { 100% { transform: translateY(4px); } }
        .gacha-crank { width: 70px; height: 70px; background: radial-gradient(circle, #f3f4f6 30%, #9ca3af 70%); border-radius: 50%; border: 6px solid #4b5563; cursor: pointer; }
        .rotating-crank { animation: rotateCrank 1.2s ease forwards; }
        @keyframes rotateCrank { 100% { transform: rotate(720deg); } }
        .gacha-lucky-egg { position: absolute; width: 46px; height: 46px; border-radius: 50%; top: -60px; left: 11px; opacity: 0; }
        .dropped-egg { animation: realGravityDrop 0.7s ease-out 0.3s forwards; }
        @keyframes realGravityDrop { 100% { top: 12px; opacity: 1; } }
    </style>
</head>
<body class="p-8 flex flex-col items-center justify-center min-h-screen">

    <h1 class="gacha-title text-5xl mb-10">呆呆幸運扭蛋機</h1>

    <div class="gacha-machine">
        <div class="gacha-glass" id="gachaGlass">
            <!-- 簡單呈現扭蛋層 -->
            <div class="gacha-egg egg-pink" style="left: 20px; bottom: 10px;"></div>
            <div class="gacha-egg egg-blue" style="left: 80px; bottom: 10px;"></div>
            <div class="gacha-egg egg-yellow" style="left: 140px; bottom: 10px;"></div>
            <div class="gacha-egg egg-green" style="left: 200px; bottom: 10px;"></div>
            <div class="gacha-egg egg-purple" style="left: 260px; bottom: 10px;"></div>
        </div>
        <div class="flex flex-col items-center gap-4 bg-[#991b1b] p-6 rounded-b-[20px]">
            <div class="gacha-crank" id="gachaCrank" onclick="startDraw()"></div>
            <div class="w-[75px] h-[75px] bg-slate-900 rounded-b-lg border-4 border-slate-700 relative overflow-hidden">
                <div class="gacha-lucky-egg" id="luckyEgg"></div>
            </div>
        </div>
    </div>

    <!-- 獲獎彈窗 -->
    <div id="winModal" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4" style="display: none;">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center">
            <h2 id="modalTitle" class="text-2xl font-black text-rose-500 mb-4">🎉 恭喜中獎！</h2>
            <p id="modalPrizeName" class="text-xl font-bold mb-6">獎品名稱</p>
            <button id="modalTicketCode" onclick="clickTicket()" class="w-full bg-slate-900 text-cyan-400 py-3 rounded-xl font-bold mb-4">點我打開獎品連結</button>
            <button onclick="closeModal()" class="w-full bg-gray-200 py-3 rounded-xl font-bold">收下好禮</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://daidaikunbao-default-rtdb.firebaseio.com/" }));
        let isDrawing = false;
        let currentPrizeUrl = "";

        window.startDraw = startDraw;
        window.closeModal = closeModal;
        window.clickTicket = () => window.open(currentPrizeUrl, "_blank");

        function startDraw() {
            if (isDrawing) return;
            isDrawing = true;

            runTransaction(ref(db), (data) => {
                if (!data) return;
                
                // 權重計算核心
                let pool = [];
                let totalWeight = 0;
                for (let id in data.prizes) {
                    let p = data.prizes[id];
                    if (Number(p.quantity) > 0 && Number(p.weight) > 0) {
                        pool.push({ id, prize: p, weight: Number(p.weight) });
                        totalWeight += Number(p.weight);
                    }
                }

                let roll = Math.random() * totalWeight;
                let sum = 0;
                let chosen = null;
                for (let item of pool) {
                    sum += item.weight;
                    if (roll < sum) { chosen = item; break; }
                }

                if (!chosen) return;

                let prize = chosen.prize;
                let code = (prize.ticketCodes && prize.ticketCodes.length > 0) ? prize.ticketCodes.shift() : (prize.code || "");
                
                prize.quantity--;
                if (!data.playedUsers) data.playedUsers = {};
                data.playedUsers["抽獎者"] = { won: prize.name, code: code };
                return data;
            }).then(result => {
                if (!result.committed) { alert("失敗"); isDrawing = false; return; }
                
                // 動畫觸發
                const glass = document.getElementById("gachaGlass");
                glass.classList.add("eggs-drop-down");
                document.getElementById("gachaCrank").classList.add("rotating-crank");
                
                setTimeout(() => {
                    const myRes = result.snapshot.val().playedUsers["抽獎者"];
                    currentPrizeUrl = myRes.code;
                    document.getElementById("modalPrizeName").innerText = myRes.won;
                    
                    // 銘謝惠顧判斷
                    if (myRes.won.includes("銘謝惠顧")) {
                        document.getElementById("modalTitle").innerText = "😢 再接再厲";
                        document.getElementById("modalTicketCode").style.display = "none";
                    } else {
                        document.getElementById("modalTitle").innerText = "🎉 恭喜中獎！";
                        document.getElementById("modalTicketCode").style.display = "block";
                    }
                    
                    document.getElementById("winModal").style.display = "flex";
                    isDrawing = false;
                }, 2000);
            });
        }

        function closeModal() {
            document.getElementById("winModal").style.display = "none";
            document.getElementById("gachaGlass").classList.remove("eggs-drop-down");
            document.getElementById("gachaCrank").classList.remove("rotating-crank");
        }
    </script>
</body>
</html>
