<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 呆呆抽獎 🎟️</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: radial-gradient(circle, #0f2027, #203a43, #2c5364); color: white; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 100%; max-width: 520px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.15); }
        h1 { margin-top: 0; color: #ff007f; text-shadow: 0 0 12px rgba(255,0,127,0.5); font-size: 28px; }
        
        /* 獎品即時看板（已移除任何機率字眼） */
        .status-board { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid #ff007f; text-align: left; font-size: 14px; line-height: 1.6; }
        .prize-title-text { font-weight: bold; margin-bottom: 8px; color: #ff007f; display: block; font-size: 15px; }
        .prize-item-row { display: flex; align-items: center; margin: 8px 0; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .prize-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; margin-right: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); display: block; }
        .prize-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .prize-name-label { font-size: 16px; font-weight: bold; color: #ffffff; margin-bottom: 2px; }

        .login-box { margin-bottom: 15px; }
        input { width: 85%; padding: 12px; border-radius: 8px; border: none; font-size: 16px; text-align: center; background: rgba(255,255,255,0.9); color: #222; font-weight: bold; }
        
        /* 拉霸滾動區 */
        .slot-machine { background: #111; border: 6px solid #ff007f; border-radius: 15px; padding: 15px; margin: 20px 0; box-shadow: 0 0 25px rgba(255,0,127,0.4); display: flex; justify-content: center; overflow: hidden; height: 110px; }
        .slot-window { background: #fff; color: #222; width: 90%; height: 100%; border-radius: 6px; font-size: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 2px solid #333; }
        .slot-track { display: flex; flex-direction: column; position: absolute; top: 0; }
        .slot-item { height: 76px; display: flex; align-items: center; justify-content: center; width: 100%; text-align: center; white-space: nowrap; padding: 0 10px; }

        button { background: linear-gradient(135deg, #00f2fe, #4facfe); color: white; border: none; padding: 15px 35px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 20px rgba(79,172,254,0.4); transition: 0.2s; width: 85%; }
        button:hover { transform: scale(1.03); filter: brightness(1.1); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; transform: none; }

        /* 中獎彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; color: #222; padding: 30px; border-radius: 20px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal h2 { color: #ff007f; margin-top: 0; font-size: 24px; }
        .ticket-box { background: #f9f9f9; border: 2px dashed #00f2fe; padding: 15px; font-size: 22px; font-weight: bold; letter-spacing: 1px; color: #008b9b; margin: 15px 0; border-radius: 8px; cursor: pointer; word-break: break-all; transition: 0.2s; }
        .ticket-box:hover { background: #f0fbfd; filter: brightness(0.98); }
        .close-btn { background: #333; font-size: 14px; padding: 10px 20px; width: auto; margin-top: 10px; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 頂部名稱已確實更改為：呆呆抽獎 -->
    <h1>🎰 呆呆抽獎 🎟️</h1>
    
    <!-- 2. 獎品清單看板（絕不顯示任何中獎率與 % 數） -->
    <div class="status-board" id="statusBoard">正在載入雲端禮品庫存...</div>

    <!-- 暱稱輸入區 -->
    <div class="login-box" id="loginBox">
        <input type="text" id="playerName" placeholder="請先輸入你的名字" maxlength="10">
    </div>

    <!-- 拉霸機 -->
    <div class="slot-machine">
        <div class="slot-window">
            <div class="slot-track" id="slotTrack">
                <div class="slot-item" style="height:76px;">💎 祝你中獎 💎</div>
            </div>
        </div>
    </div>

    <button id="spinBtn" onclick="startDraw()">點我啟動拉霸機</button>
</div>

<!-- 獎券發放彈窗 -->
<div class="modal" id="winModal">
    <div class="modal-content">
        <h2 id="modalTitle">🎉 恭喜中獎！</h2>
        <p style="font-weight: bold; font-size: 18px;" id="modalPrizeName">獲得獎項</p>
        <div class="ticket-box" id="modalTicketCode" onclick="copyTicket()">TICKET-CODE</div>
        <p style="font-size: 12px; color: #666;" id="copyHint">↑ 點擊後輸入密碼「3064」，請截圖保存！</p>
        <button class="close-btn" onclick="closeModal()">關閉視窗</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // 🔗 您的專屬 Firebase 網址
    const firebaseConfig = {
        databaseURL: "https://daidaikunbao-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.startDraw = startDraw;
    window.closeModal = closeModal;
    window.copyTicket = copyTicket;

    let isDrawing = false;
    let localPrizesData = {};

    // 即時更新看板：僅顯示商品圖、品名、剩餘數量。機率完全拔除！
    onValue(ref(db, 'prizes'), (snapshot) => {
        const prizes = snapshot.val();
        if (!prizes) {
            document.getElementById("statusBoard").innerHTML = "❌ 系統提示：後台尚未配置任何獎品結構。";
            return;
        }
        localPrizesData = prizes;

        let html = '<span class="prize-title-text">📋 目前的禮物：</span>';
        let hasVisiblePrize = false;

        for (let id in prizes) {
            const p = prizes[id];
            
            // 🛡️ 關鍵隱藏邏輯：只要獎品名稱包含「銘謝惠顧」，就跳過不渲染到看板上
            if (p.name && p.name.includes("銘謝惠顧")) {
                continue; 
            }

            hasVisiblePrize = true;
            
            // 處理商品圖：若後台有填 image 網址就秀圖，沒有就用灰底預防空圖
            const imgHtml = p.image ? `<img class="prize-thumb" src="${p.image}" alt="${p.name}">` : `<div class="prize-thumb" style="background:rgba(255,255,255,0.15);"></div>`;

            if (Number(p.quantity) > 0) {
                html += `
                <div class="prize-item-row">
                    ${imgHtml}
                    <div class="prize-info">
                        <span class="prize-name-label">${p.name}</span>
                        <span style="color:#00f2fe; font-size:13px;">🟢 剩餘 <b>${p.quantity}</b> 份</span>
                    </div>
                </div>`;
            } else {
                html += `
                <div class="prize-item-row" style="opacity: 0.4;">
                    ${imgHtml}
                    <div class="prize-info">
                        <span class="prize-name-label" style="text-decoration: line-through; color:#aaa;">${p.name}</span>
                        <span style="color:#ff007f; font-size:13px;">🔴 已全數送完</span>
                    </div>
                </div>`;
            }
        }

        if (!hasVisiblePrize) {
            html += '<div style="color: #aaa; font-size: 13px; padding: 10px;">目前無公開好禮。</div>';
        }

        document.getElementById("statusBoard").innerHTML = html;
    });

    // 核心強奪鎖
    function startDraw() {
        const nameInput = document.getElementById("playerName").value.trim();
        if (!nameInput) {
            alert("請先輸入你的名字喔！");
            return;
        }
        if (isDrawing) return;
        
        isDrawing = true;
        document.getElementById("spinBtn").disabled = true;
        document.getElementById("spinBtn").innerText = "好運計算中...";
        document.getElementById("playerName").disabled = true;

        const prizesRef = ref(db, 'prizes');
        let finalWonPrize = null;

        runTransaction(prizesRef, (currentPrizes) => {
            if (!currentPrizes) return currentPrizes;

            let pool = [];
            let totalW = 0;
            for (let id in currentPrizes) {
                if (Number(currentPrizes[id].quantity) > 0) {
                    pool.push({ id: id, weight: Number(currentPrizes[id].weight || 0) });
                    totalW += Number(currentPrizes[id].weight || 0);
                }
            }

            if (pool.length === 0 || totalW === 0) return;

            let randomNum = Math.floor(Math.random() * totalW);
            let selectedId = null;
            
            for (let i = 0; i < pool.length; i++) {
                randomNum -= pool[i].weight;
                if (randomNum < 0) {
                    selectedId = pool[i].id;
                    break;
                }
            }

            if (!selectedId) selectedId = pool[0].id;

            const prize = currentPrizes[selectedId];
            prize.quantity = Number(prize.quantity) - 1;

            let assignedCode = "無可用票券";
            if (prize.ticketCodes && prize.ticketCodes.length > 0) {
                const codeIndex = prize.ticketCodes.length - 1 - prize.quantity;
                if (prize.ticketCodes[codeIndex] !== undefined) {
                    assignedCode = prize.ticketCodes[codeIndex];
                } else {
                    assignedCode = prize.ticketCodes[0];
                }
            }

            if(!prize.recentWinners) prize.recentWinners = [];
            prize.recentWinners.push({ user: nameInput, code: assignedCode, time: Date.now() });

            finalWonPrize = {
                name: prize.name,
                code: assignedCode
            };

            return currentPrizes;
        }).then((result) => {
            if (result.committed && finalWonPrize) {
                runSlotMachineAnimation(finalWonPrize.name, () => {
                    if (finalWonPrize.name.includes("銘謝惠顧")) {
                        showWinModal("😭 哎呀可惜！", finalWonPrize.name, "請再接再厲！", true);
                    } else {
                        showWinModal("🎉 恭喜你中獎了！", finalWonPrize.name, finalWonPrize.code, false);
                    }
                    resetButtonState();
                });
            } else {
                runSlotMachineAnimation("💔 沒中獎", () => {
                    showWinModal("沒中獎", "不要氣餒！", "下次再加油", true);
                    resetButtonState();
                });
            }
        }).catch((err) => {
            alert("系統錯誤：" + err.message);
            resetButtonState();
        });
    }

    // 拉霸滾動效果（保留您修改的精采名單）
    function runSlotMachineAnimation(finalResult, callback) {
        const track = document.getElementById("slotTrack");
        track.innerHTML = "";

        const dummyPool = ["睏寶", "怡蒨", "77", "安鴻", "當家"];
        for(let i=0; i<25; i++) {
            const item = document.createElement("div");
            item.className = "slot-item";
            item.style.height = "76px";
            item.innerText = dummyPool[Math.floor(Math.random() * dummyPool.length)];
            track.appendChild(item);
        }
        track.lastElementChild.innerText = finalResult;

        let currentTop = 0;
        let speed = 35;
        let count = 0;

        function animate() {
            currentTop -= speed;
            track.style.top = currentTop + "px";
            count++;

            if(count > 30) speed = 15;
            if(count > 50) speed = 6;
            if(count > 60) speed = 3;

            if (count > 68) {
                track.style.top = `-${(track.children.length - 1) * 76 - 15}px`;
                setTimeout(callback, 400);
            } else {
                requestAnimationFrame(animate);
            }
        }
        animate();
    }

    // 重設按鈕狀態
    function resetButtonState() {
        isDrawing = false;
        document.getElementById("spinBtn").disabled = false;
        document.getElementById("spinBtn").innerText = "點我啟動拉霸機";
        document.getElementById("playerName").disabled = false;
    }

    function showWinModal(title, prizeName, code, isLose) {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalPrizeName").innerText = prizeName;
        
        const ticketBox = document.getElementById("modalTicketCode");
        const hintBox = document.getElementById("copyHint");
        
        if (code.startsWith("http")) {
            ticketBox.innerText = "👉 點我並輸入密碼「3064」，即可查看獎品 👈";
            ticketBox.style.color = "#ff007f";
            ticketBox.style.border = "2px solid #ff007f";
            ticketBox.setAttribute("data-url", code);
            hintBox.innerText = "長按即可儲存截圖！";
            hintBox.style.display = "block";
        } else {
            ticketBox.innerText = code;
            ticketBox.removeAttribute("data-url");
            if(isLose) {
                ticketBox.style.border = "2px dashed #999";
                ticketBox.style.color = "#666";
                hintBox.style.display = "none";
            } else {
                ticketBox.style.border = "2px dashed #00f2fe";
                ticketBox.style.color = "#008b9b";
                hintBox.innerText = "↑ 點擊後輸入密碼「3064」，請截圖保存！";
                hintBox.style.display = "block";
            }
        }
        document.getElementById("winModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("winModal").style.display = "none";
    }

    // 點擊卡片動作
    function copyTicket() {
        const ticketBox = document.getElementById("modalTicketCode");
        const imgUrl = ticketBox.getAttribute("data-url");
        
        if (imgUrl) {
            window.open(imgUrl, '_blank');
            return;
        }
        
        const code = ticketBox.innerText;
        if(code.includes("請再接再厲") || code.includes("重新再試")) return;
        navigator.clipboard.writeText(code).then(() => {
            alert("序號複製成功！可以去兌換囉！");
        });
    }
</script>
</body>
</html>
