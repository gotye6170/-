<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐹 呆呆扭蛋機 🎟️</title>
    <style>
        * { box-sizing: border-box; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        
        /* 🌸 夢幻亮色系背景 */
        body { 
            background: linear-gradient(135deg, #e0f2fe 0%, #fce7f3 50%, #fbcfe8 100%); 
            color: #4c1d95; 
            min-height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* 日系清新容器 */
        .container { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 25px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(219, 39, 119, 0.15), inset 0 0 15px rgba(255,255,255,0.6); 
            width: 100%; 
            max-width: 480px; 
            text-align: center; 
            border: 2px solid rgba(255, 255, 255, 0.8); 
        }
        
        h1 { 
            margin-top: 0; 
            background: linear-gradient(135deg, #ec4899, #f43f5e, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 30px; 
            font-weight: 900;
            letter-spacing: 1px;
            filter: drop-shadow(0 2px 4px rgba(255, 255, 255, 0.8));
        }
        
        .status-board { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 15px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            border: 2px solid #fbcfe8;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
            text-align: left; 
            font-size: 14px; 
            line-height: 1.6; 
        }
        .prize-title-text { font-weight: bold; margin-bottom: 8px; color: #db2777; display: block; font-size: 15px; }
        .prize-item-row { display: flex; align-items: center; margin: 8px 0; background: #fffdfd; padding: 10px; border-radius: 12px; border: 1px solid #fce7f3; transition: 0.3s; }
        .prize-item-row:hover { background: #fffbfa; border-color: #f43f5e; }
        .prize-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 10px; margin-right: 12px; background: #f3f4f6; border: 1px solid #e5e7eb; display: block; }
        .prize-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .prize-name-label { font-size: 15px; font-weight: bold; color: #4c1d95; margin-bottom: 2px; }

        .login-box { margin-bottom: 20px; }
        
        select { 
            width: 85%; padding: 12px; border-radius: 50px; border: 2px solid #fbcfe8; 
            font-size: 15px; text-align: center; text-align-last: center; background: white; 
            color: #4c1d95; font-weight: bold; transition: 0.3s; cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05); appearance: none; -webkit-appearance: none;
        }
        select:focus { outline: none; border-color: #f43f5e; box-shadow: 0 0 10px rgba(244,63,94,0.2); }

        /* 🌸 扭蛋機外觀 */
        .gachapon-machine {
            width: 240px;
            margin: 20px auto;
        }
        
        /* 透明壓克力櫥窗 */
        .gacha-ball-container {
            width: 220px;
            height: 190px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.3) 100%);
            border: 5px solid #ffffff;
            border-top: 15px solid #f43f5e; 
            border-radius: 16px 16px 8px 8px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08), inset 0 0 15px rgba(255,255,255,0.5);
        }

        /* 馬卡龍色系雙色扭蛋 */
        .gacha-egg {
            width: 36px;
            height: 36px;
            position: absolute;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 3px 5px rgba(0,0,0,0.12), inset 0 2px 4px rgba(255,255,255,0.6);
            transform-origin: center;
        }
        .gacha-egg::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
        }
        .gacha-egg::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: #ffffff;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .egg-pink::before   { background: #ff49db; }
        .egg-blue::before   { background: #3b82f6; }
        .egg-yellow::before { background: #facc15; }
        .egg-cyan::before   { background: #2dd4bf; }
        .egg-orange::before { background: #f97316; }
        .egg-purple::before { background: #a855f7; }

        /* 機身底座 */
        .gacha-body {
            width: 230px;
            background: #f43f5e; 
            border-radius: 8px 8px 24px 24px;
            margin: -2px auto 0;
            padding: 18px 10px;
            box-shadow: 0 8px 20px rgba(244,63,94,0.3);
            position: relative;
            border: 3px solid #ffffff;
        }
        
        /* 旋鈕 */
        .gacha-crank {
            width: 65px;
            height: 65px;
            background: radial-gradient(circle, #ffe066 30%, #f59e0b 100%);
            border: 3px solid #ffffff;
            border-radius: 50%;
            margin: 0 auto 12px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
        }
        .gacha-crank::before {
            content: '扭蛋';
            position: absolute; width: 85%; height: 20px; background: #ffffff;
            top: 50%; left: 7.5%; transform: translateY(-50%); border-radius: 4px;
            color: #d97706; font-size: 11px; font-weight: bold; line-height: 20px; text-align: center;
        }
        
        /* 出蛋口 */
        .gacha-outlet {
            width: 75px; height: 55px; background: #991b1b; border: 3px solid #ffffff;
            margin: 0 auto; border-radius: 12px 12px 6px 6px; box-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
            position: relative;
        }

        /* 滾出來的幸運雙色扭蛋 */
        .gacha-lucky-egg {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            position: absolute;
            top: 3px; left: 13px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.6);
            display: none;
            z-index: 10;
            overflow: hidden;
        }
        .gacha-lucky-egg::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: #ff49db; 
        }
        .gacha-lucky-egg::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: #ffffff; border-top: 1px solid rgba(0,0,0,0.1);
        }

        /* 🎬 核心變更：重力沉降與推擠碎步動態（分成三層模擬錯落滑落感） */
        @keyframes settleLayerA {
            0% { transform: translateY(0) rotate(var(--init-rot)); }
            30% { transform: translateY(2px) rotate(calc(var(--init-rot) - 3deg)); }
            70% { transform: translateY(7px) rotate(calc(var(--init-rot) + 5deg)); }
            100% { transform: translateY(6px) rotate(calc(var(--init-rot) + 3deg)); }
        }
        @keyframes settleLayerB {
            0% { transform: translateY(0) rotate(var(--init-rot)); }
            40% { transform: translateY(3px) rotate(calc(var(--init-rot) + 4deg)); }
            80% { transform: translateY(8px) rotate(calc(var(--init-rot) - 6deg)); }
            100% { transform: translateY(7px) rotate(calc(var(--init-rot) - 4deg)); }
        }
        @keyframes settleLayerC {
            0% { transform: translateY(0) rotate(var(--init-rot)); }
            20% { transform: translateY(1px) rotate(calc(var(--init-rot) - 2deg)); }
            60% { transform: translateY(5px) rotate(calc(var(--init-rot) + 4deg)); }
            100% { transform: translateY(4px) rotate(calc(var(--init-rot) + 2deg)); }
        }

        /* 執行沉降動畫 */
        .settling .egg-layer-a { animation: settleLayerA 0.5s ease-in-out forwards; }
        .settling .egg-layer-b { animation: settleLayerB 0.55s ease-in-out forwards; }
        .settling .egg-layer-c { animation: settleLayerC 0.48s ease-in-out forwards; }

        /* 旋鈕旋轉 */
        @keyframes crankRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .rotating-crank { animation: crankRotate 0.6s ease-in-out forwards; }

        /* 扭蛋自然滾落出洞 */
        @keyframes eggDrop {
            0% { transform: translateY(-40px) scale(0.4) rotate(0deg); opacity: 0; }
            50% { transform: translateY(0) scale(1) rotate(120deg); opacity: 1; }
            100% { transform: translateY(4px) scale(1.3) rotate(180deg); filter: drop-shadow(0 0 6px rgba(255,73,219,0.3)); }
        }
        .dropped-egg { display: block !important; animation: eggDrop 0.5s ease-out forwards; }

        button { 
            background: linear-gradient(135deg, #f43f5e, #ec4899); 
            color: white; border: none; padding: 15px 32px; 
            font-size: 17px; font-weight: bold; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(244,63,94,0.3); transition: 0.3s; width: 85%; letter-spacing: 1px;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 7px 20px rgba(244,63,94,0.4); }
        button:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }

        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(76, 29, 149, 0.3); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #ffffff; color: #4c1d95; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.15); border: 3px solid #fbcfe8; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); }
        .modal h2 { color: #e11d48; margin-top: 0; font-size: 24px; }
        .ticket-box { background: #fff1f2; border: 2px dashed #f43f5e; padding: 16px; font-size: 20px; font-weight: bold; color: #e11d48; margin: 18px 0; border-radius: 12px; cursor: pointer; word-break: break-all; transition: 0.2s; }
        .ticket-box:hover { background: #ffe4e6; }
        .close-btn { background: #f3f4f6; color: #4b5563; font-size: 14px; padding: 10px 22px; width: auto; margin-top: 12px; box-shadow: none; }
        .close-btn:hover { background: #e5e7eb; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🌸 落英繽紛扭蛋機 🎟️</h1>
    
    <div class="status-board" id="statusBoard">正在讀取雲端禮物庫存...</div>

    <div class="login-box" id="loginBox">
        <select id="playerName">
            <option value="" disabled selected>▼ 請選擇你的名字 ▼</option>
            <option value="貝果">貝果</option>
            <option value="怡蒨">怡蒨</option>
            <option value="77">77</option>
            <option value="安鴻">安鴻</option>
            <option value="當家">當家</option>
        </select>
    </div>

    <!-- 🌸 經典重力櫥窗：馬卡龍無序堆疊 -->
    <div class="gachapon-machine">
        <div class="gacha-ball-container" id="gachaGlass">
            <!-- 底層扭蛋 (Layer A) -->
            <div class="gacha-egg egg-pink egg-layer-a" style="bottom: 6px; left: 12px; --init-rot: 12deg; transform: rotate(12deg);"></div>
            <div class="gacha-egg egg-blue egg-layer-a" style="bottom: 4px; left: 45px; --init-rot: -20deg; transform: rotate(-20deg);"></div>
            <div class="gacha-egg egg-yellow egg-layer-a" style="bottom: 10px; left: 78px; --init-rot: 35deg; transform: rotate(35deg);"></div>
            <div class="gacha-egg egg-cyan egg-layer-a" style="bottom: 5px; left: 112px; --init-rot: -15deg; transform: rotate(-15deg);"></div>
            <div class="gacha-egg egg-orange egg-layer-a" style="bottom: 8px; left: 146px; --init-rot: 25deg; transform: rotate(25deg);"></div>
            <div class="gacha-egg egg-purple egg-layer-a" style="bottom: 4px; left: 176px; --init-rot: -40deg; transform: rotate(-40deg);"></div>
            
            <!-- 中層扭蛋 (Layer B) -->
            <div class="gacha-egg egg-yellow egg-layer-b" style="bottom: 34px; left: 22px; --init-rot: -30deg; transform: rotate(-30deg);"></div>
            <div class="gacha-egg egg-pink egg-layer-b" style="bottom: 38px; left: 56px; --init-rot: 18deg; transform: rotate(18deg);"></div>
            <div class="gacha-egg egg-cyan egg-layer-b" style="bottom: 32px; left: 90px; --init-rot: -10deg; transform: rotate(-10deg);"></div>
            <div class="gacha-egg egg-orange egg-layer-b" style="bottom: 36px; left: 126px; --init-rot: 45deg; transform: rotate(45deg);"></div>
            <div class="gacha-egg egg-blue egg-layer-b" style="bottom: 31px; left: 160px; --init-rot: -25deg; transform: rotate(-25deg);"></div>

            <!-- 上層扭蛋 (Layer C) -->
            <div class="gacha-egg egg-cyan egg-layer-c" style="bottom: 64px; left: 38px; --init-rot: 40deg; transform: rotate(40deg);"></div>
            <div class="gacha-egg egg-purple egg-layer-c" style="bottom: 62px; left: 72px; --init-rot: -50deg; transform: rotate(-50deg);"></div>
            <div class="gacha-egg egg-yellow egg-layer-c" style="bottom: 66px; left: 108px; --init-rot: 10deg; transform: rotate(10deg);"></div>
            <div class="gacha-egg egg-pink egg-layer-c" style="bottom: 60px; left: 142px; --init-rot: -28deg; transform: rotate(-28deg);"></div>
            
            <!-- 頂層零星 -->
            <div class="gacha-egg egg-orange egg-layer-c" style="bottom: 92px; left: 60px; --init-rot: 20deg; transform: rotate(20deg);"></div>
            <div class="gacha-egg egg-blue egg-layer-c" style="bottom: 90px; left: 96px; --init-rot: -15deg; transform: rotate(-15deg);"></div>
            <div class="gacha-egg egg-purple egg-layer-c" style="bottom: 88px; left: 130px; --init-rot: 55deg; transform: rotate(55deg);"></div>
        </div>
        
        <div class="gacha-body">
            <div class="gacha-crank" id="gachaCrank"></div>
            <div class="gacha-outlet">
                <!-- 一致外觀的馬卡龍幸運蛋 -->
                <div class="gacha-lucky-egg" id="luckyEgg"></div>
            </div>
        </div>
    </div>

    <button id="spinBtn" onclick="startDraw()">啟動幸運扭蛋</button>
</div>

<!-- 中獎彈窗 -->
<div class="modal" id="winModal">
    <div class="modal-content">
        <h2 id="modalTitle">🎉 恭喜中獎！</h2>
        <p style="font-weight: bold; font-size: 18px; color: #db2777;" id="modalPrizeName">獲得獎項</p>
        <div class="ticket-box" id="modalTicketCode" onclick="copyTicket()">TICKET-CODE</div>
        <p style="font-size: 12px; color: #6b7280;" id="copyHint">↑ 點擊後輸入密碼「3064」，請截圖保存！</p>
        <button class="close-btn" onclick="closeModal()">關閉視窗</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://daidaikunbao-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.startDraw = startDraw;
    window.closeModal = closeModal;
    window.copyTicket = copyTicket;

    let isDrawing = false;

    // 即時看板監聽
    onValue(ref(db, 'prizes'), (snapshot) => {
        const prizes = snapshot.val();
        if (!prizes) {
            document.getElementById("statusBoard").innerHTML = "❌ 後台尚未配置獎品結構。";
            return;
        }

        let html = '<span class="prize-title-text">📋 目前剩餘好禮：</span>';
        let hasVisiblePrize = false;

        for (let id in prizes) {
            const p = prizes[id];
            if (p.name && p.name.includes("銘謝惠顧")) continue; 

            hasVisiblePrize = true;
            const imgHtml = p.image ? `<img class="prize-thumb" src="${p.image}" alt="${p.name}">` : `<div class="prize-thumb" style="background:#f3f4f6;"></div>`;

            if (Number(p.quantity) > 0) {
                html += `
                <div class="prize-item-row">
                    ${imgHtml}
                    <div class="prize-info">
                        <span class="prize-name-label">${p.name}</span>
                        <span style="color:#059669; font-size:13px; font-weight:bold;">🟢 剩餘 <b>${p.quantity}</b> 份</span>
                    </div>
                </div>`;
            } else {
                html += `
                <div class="prize-item-row" style="opacity: 0.4;">
                    ${imgHtml}
                    <div class="prize-info">
                        <span class="prize-name-label" style="text-decoration: line-through; color:#9ca3af;">${p.name}</span>
                        <span style="color:#dc2626; font-size:13px; font-weight:bold;">🔴 已全數送完</span>
                    </div>
                </div>`;
            }
        }
        if (!hasVisiblePrize) html += '<div style="color: #9ca3af; font-size: 13px; padding: 10px;">目前無公開好禮。</div>';
        document.getElementById("statusBoard").innerHTML = html;
    });

    function startDraw() {
        const nameInput = document.getElementById("playerName").value;
        if (!nameInput) {
            alert("請先選擇你的名字喔！");
            return;
        }
        if (isDrawing) return;
        
        isDrawing = true;
        document.getElementById("spinBtn").disabled = true;
        document.getElementById("spinBtn").innerText = "轉動中...";
        document.getElementById("playerName").disabled = true;

        document.getElementById("luckyEgg").classList.remove("dropped-egg");

        const rootRef = ref(db);
        let finalWonPrize = null;
        let isAlreadyPlayed = false;

        runTransaction(rootRef, (currentData) => {
            if (!currentData) return currentData;
            if (!currentData.prizes) currentData.prizes = {};
            if (!currentData.playedUsers) currentData.playedUsers = {};

            if (currentData.playedUsers[nameInput]) {
                isAlreadyPlayed = true;
                return; 
            }

            let currentPrizes = currentData.prizes;
            let pool = [];
            let totalW = 0;
            for (let id in currentPrizes) {
                if (Number(currentPrizes[id].quantity) > 0) {
                    pool.push({ id: id, weight: Number(currentPrizes[id].weight || 0) });
                    totalW += Number(currentPrizes[id].weight || 0);
                }
            }

            if (pool.length === 0 || totalW === 0) return;

            let randomNum = Math.floor(Math.random() * totalW);
            let selectedId = null;
            
            for (let i = 0; i < pool.length; i++) {
                randomNum -= pool[i].weight;
                if (randomNum < 0) {
                    selectedId = pool[i].id;
                    break;
                }
            }

            if (!selectedId) selectedId = pool[0].id;

            const prize = currentPrizes[selectedId];
            prize.quantity = Number(prize.quantity) - 1;

            let assignedCode = "無可用票券";
            if (prize.ticketCodes && prize.ticketCodes.length > 0) {
                const codeIndex = prize.ticketCodes.length - 1 - prize.quantity;
                assignedCode = prize.ticketCodes[codeIndex] !== undefined ? prize.ticketCodes[codeIndex] : prize.ticketCodes[0];
            }

            if(!prize.recentWinners) prize.recentWinners = [];
            prize.recentWinners.push({ user: nameInput, code: assignedCode, time: Date.now() });

            currentData.playedUsers[nameInput] = { time: Date.now(), won: prize.name };
            finalWonPrize = { name: prize.name, code: assignedCode };

            return currentData;
        }).then((result) => {
            if (isAlreadyPlayed) {
                alert(`⚠️ 提示：【${nameInput}】你已經抽過囉！不能重複扭蛋哦～`);
                resetButtonState();
                return;
            }

            if (result.committed && finalWonPrize) {
                // 執行重力物理感擬真動畫
                runGachaponAnimation(() => {
                    if (finalWonPrize.name.includes("銘謝惠顧")) {
                        showWinModal("😭 哎呀可惜！", finalWonPrize.name, "請再接再厲！", true);
                    } else {
                        showWinModal("🎉 恭喜你中獎了！", finalWonPrize.name, finalWonPrize.code, false);
                    }
                    resetButtonState();
                });
            } else {
                runGachaponAnimation(() => {
                    showWinModal("沒中獎", "不要氣餒！", "下次再加油", true);
                    resetButtonState();
                });
            }
        }).catch((err) => {
            alert("系統錯誤：" + err.message);
            resetButtonState();
        });
    }

    // 🎬 擬真重力微幅沉降動畫
    function runGachaponAnimation(callback) {
        const glass = document.getElementById("gachaGlass");
        const crank = document.getElementById("gachaCrank");
        const luckyEgg = document.getElementById("luckyEgg");

        // 1. 轉動把手
        crank.classList.add("rotating-crank");

        // 2. 轉動一陣子後，裡面的扭蛋堆因為少了一顆，開始產生向下沉降、微幅滾動推擠的效果
        setTimeout(() => {
            glass.classList.add("settling");
        }, 200);

        // 3. 沉降的同時，幸運扭蛋順暢滾落出洞
        setTimeout(() => {
            luckyEgg.classList.add("dropped-egg");
        }, 400);

        // 結束動畫並呈現結果彈窗
        setTimeout(() => {
            crank.classList.remove("rotating-crank");
            // 彈窗出現後不急著重設內殼位置，保持沉降後的靜止狀態
            callback();
        }, 1200); 
    }

    function resetButtonState() {
        isDrawing = false;
        document.getElementById("spinBtn").disabled = false;
        document.getElementById("spinBtn").innerText = "啟動幸運扭蛋";
        document.getElementById("playerName").disabled = false;
        
        // 下一位玩家準備玩之前，重置回初始堆疊位置
        document.getElementById("gachaGlass").classList.remove("settling");
    }

    function showWinModal(title, prizeName, code, isLose) {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalPrizeName").innerText = prizeName;
        
        const ticketBox = document.getElementById("modalTicketCode");
        const hintBox = document.getElementById("copyHint");
        
        if (code.startsWith("http")) {
            ticketBox.innerText = "👉 點我並輸入密碼「3064」，即可查看獎品 👈";
            ticketBox.style.color = "#ec4899";
            ticketBox.style.border = "2px solid #ec4899";
            ticketBox.setAttribute("data-url", code);
            hintBox.innerText = "長按即可儲存截圖！";
            hintBox.style.display = "block";
        } else {
            ticketBox.innerText = code;
            ticketBox.removeAttribute("data-url");
            if(isLose) {
                ticketBox.style.border = "2px dashed #94a3b8";
                ticketBox.style.color = "#64748b";
                hintBox.style.display = "none";
            } else {
                ticketBox.style.border = "2px dashed #ec4899";
                ticketBox.style.color = "#ec4899";
                hintBox.innerText = "↑ 點擊後輸入密碼「3064」，請截圖保存！";
                hintBox.style.display = "block";
            }
        }
        document.getElementById("winModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("winModal").style.display = "none";
    }

    function copyTicket() {
        const ticketBox = document.getElementById("modalTicketCode");
        const imgUrl = ticketBox.getAttribute("data-url");
        if (imgUrl) {
            window.open(imgUrl, '_blank');
            return;
        }
        const code = ticketBox.innerText;
        if(code.includes("請再接再厲") || code.includes("重新再試")) return;
        navigator.clipboard.writeText(code).then(() => {
            alert("序號複製成功！可以去兌換囉！");
        });
    }
</script>
</body>
</html>
